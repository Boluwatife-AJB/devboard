  services:
    postgres:
      image: postgres:17-alpine
      container_name: devboard_db
      environment:
        POSTGRES_USER: devboard
        POSTGRES_PASSWORD: devboard
        POSTGRES_DB: devboard
      ports:
        - "5433:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U devboard -d devboard"]
        interval: 5s
        timeout: 5s
        retries: 10

  volumes:
    postgres_data:
