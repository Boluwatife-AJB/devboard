services:
  postgres:
    image: postgres:17-alpine
    container_name: devboard-test-postgres
    environment:
      POSTGRES_USER: devboard
      POSTGRES_PASSWORD: devboard
      POSTGRES_DB: devboard_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devboard -d devboard_test"]
      interval: 5s
      timeout: 5s
      retries: 5
